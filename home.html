<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>E-TODA • Home</title>
  <link rel="stylesheet" href="home.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img class="brandLogo" src="logo.png" alt="E-TODA" />
    <div class="brandText">
      <div class="brandTitle">E-TODA</div>
      <div class="brandSub">Web Based Tricycle Booking</div>
    </div>
  </div>

  <div class="acctWrap">
  <button id="acctBtn" class="acctBtn" aria-haspopup="menu" aria-expanded="false" title="Account">
    <div id="acctAvatar" class="letterAvatar"></div>
  </button>

  <div id="acctMenu" class="acctMenu hidden" role="menu">
    <div class="acctHeader">
      <div id="menuAvatar" class="letterAvatar large"></div>
      <div class="acctText">
        <div id="menuName" class="acctName">—</div>
        <div class="acctSub">
          <span id="menuId">—</span>
        </div>
        <div class="acctSub">
          <span id="menuRole">—</span>
        </div>
      </div>
    </div>

    <div class="acctDivider"></div>

    <button class="acctItem" role="menuitem" data-go="home.html">
      <span class="acctIcon">🏠</span> Home
    </button>
    <button class="acctItem" role="menuitem" data-go="home.html">
      <span class="acctIcon">⚙️</span> Settings & privacy
    </button>
    <button class="acctItem" role="menuitem" data-go="home.html">
      <span class="acctIcon">❓</span> Help & support
    </button>
    <div class="acctDivider"></div>

    <button id="logoutBtn" class="acctItem danger" role="menuitem">
      <span class="acctIcon">⎋</span> Log out
    </button>
  </div>
</div>

</header>

<main class="wrap">
  <!-- Passenger -->
  <section id="passengerPanel" class="card hidden">
    <h2>Passenger</h2>
    <p class="muted">Book rides and manage your activity.</p>
    <div class="grid">
      <button class="btn primary" data-go="passenger.html">Book a Ride</button>
      <button class="btn" data-go="bookings.html">My Bookings</button>
      <button class="btn" data-go="reviews.html">My Reviews</button>
    </div>
  </section>

  <!-- Driver -->
  <section id="driverPanel" class="card hidden">
    <h2>Driver</h2>
    <p class="muted">View trips, status, and verification details.</p>
    <div class="grid">
      <button class="btn primary" data-go="driver.html">Driver Dashboard</button>
      <button class="btn" data-go="driver-trips.html">Trips</button>
      <button class="btn" data-go="driver-profile.html">My PDS Profile</button>
    </div>
  </section>

  <!-- Admin -->
  <section id="adminPanel" class="card hidden">
    <h2>Admin</h2>
    <p class="muted">Manage users and review reports.</p>
    <div class="grid">
      <button class="btn primary" data-go="admin.html">Admin Panel</button>
      <button class="btn" data-go="users.html">Manage Users</button>
      <button class="btn" data-go="reports.html">Reports</button>
    </div>
  </section>

</main>


<!-- Logout Confirmation Modal -->
<div id="logoutModal" class="modal hidden">

  <div class="modalCard small">

    <h3>Confirm Logout</h3>
    <p class="muted">Are you sure you want to log out?</p>

    <div class="modalActions">
      <button id="cancelLogout" class="btn">Cancel</button>
      <button id="confirmLogout" class="btn danger">Logout</button>
    </div>

  </div>

</div>


<script src="home.js"></script>
</body>
</html>
