<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>E-TODA — Soon</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="anim.css" />
</head>
<body>

  <section class="hero">
    <div class="headline">
      <h1>E-TODA</h1>
      <p>Tricycle Booking System</p>
    </div>

    <div class="soon-badge" aria-label="Coming soon">SOON!</div>

    <div class="scene">
      <div class="skyGlow"></div>

      <div class="road">
        <div class="lane"></div>
        <div class="lane lane2"></div>
      </div>

      <div class="trikeWrap" id="trikeWrap">
        <div class="smoke" id="smoke"></div>

        <!-- Your image -->
        <img class="trikeImg" src="tricycle.png" alt="Tricycle" />

        <!-- Fake wheels (position these over your wheel area) -->
        <div class="wheel w1"></div>
        <div class="wheel w2"></div>
      </div>
    </div>

    <div class="hint">Tip: click the tricycle to speed up 🚀</div>
  </section>

  <script src="anim.js"></script>
</body>
</html>
